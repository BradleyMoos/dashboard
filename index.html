<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Bradley Moos</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧩</text></svg>" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --border: #2a2d3a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #e2e8f0;
      --muted: #64748b;
      --green: #22c55e;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 3rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    header h1 span {
      color: var(--accent);
    }

    header p {
      color: var(--muted);
      font-size: 0.875rem;
    }

    .grid {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 1.25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, transform 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.12);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .card-icon {
      font-size: 1.75rem;
      line-height: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.25rem 0.6rem;
      border-radius: 99px;
      background: rgba(34, 197, 94, 0.12);
      color: var(--green);
    }

    .badge::before {
      content: "";
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      display: block;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-url {
      font-size: 0.775rem;
      color: var(--accent);
      margin-top: auto;
      padding-top: 0.5rem;
      border-top: 1px solid var(--border);
      opacity: 0.8;
    }

    .card:hover .card-url {
      opacity: 1;
    }
  </style>
</head>
<body>

  <header>
    <div>
      <h1>Bradley <span>Moos</span></h1>
      <p>Alle apps &amp; projecten op één plek</p>
    </div>
  </header>

  <main class="grid" id="grid">

    <!-- QR Tracker Pro -->
    <a class="card" href="https://qr.bradleymoos.com" target="_blank" rel="noopener">
      <div class="card-header">
        <span class="card-icon">📲</span>
        <span class="badge">Live</span>
      </div>
      <div class="card-title">QR Tracker Pro</div>
      <div class="card-desc">Generieke QR-scan tracker. Maak unieke QR-codes aan en volg scans inclusief apparaat, browser en locatie.</div>
      <div class="card-url">qr.bradleymoos.com</div>
    </a>

    <!-- Placeholder for future apps -->

  </main>

</body>
</html>
